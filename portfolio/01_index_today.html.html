<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header>
        <div class="logo">
            <img src="assets/logo.png" alt="Logo" id="logo">
            <span>My Portfolio</span>
        </div>
        <nav>
            <ul>
                <li><a href="#about">About Me</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <button id="theme-toggle">Toggle Theme</button>
    </header>

    <!-- About Section -->
    <section id="about">
        <div class="profile">
            <img src="assets/profile.jpg" alt="Profile Picture" id="profile-pic">
            <div class="bio">
                <h1 id="name">Your Name</h1>
                <p id="bio-text">Write a brief bio about yourself here. Highlight your experience, skills, and passion.</p>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects">
        <h2>Projects</h2>
        <div class="projects-container" id="projects-container">
            <!-- Projects will be dynamically added here -->
        </div>
        <button id="add-project-btn">Add New Project</button>
    </section>

    <!-- Skills Section -->
    <section id="skills">
        <h2>Skills</h2>
        <div class="skills-container" id="skills-container">
            <!-- Skills will be dynamically added here -->
        </div>
        <button id="add-skill-btn">Add New Skill</button>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h2>Contact</h2>
        <form id="contact-form">
            <input type="text" id="contact-name" placeholder="Your Name" required>
            <input type="email" id="contact-email" placeholder="Your Email" required>
            <textarea id="contact-message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Your Name. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
